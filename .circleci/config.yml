version: 2.1

# Reusable executor — Node 22.11 matches .nvmrc and engines field in package.json.
executors:
  node:
    docker:
      - image: cimg/node:22.11
    resource_class: medium
  android:
    docker:
      - image: cimg/android:2024.12.1
    resource_class: xlarge

jobs:
  # ------------------------------------------------------------------
  # install: single source of truth for dependency installation.
  # Caches ~/.npm (the npm download cache) keyed on package-lock.json
  # so network fetches are skipped on cache hits. Persists node_modules
  # to the workspace so downstream jobs share the same install without
  # re-running npm ci.
  # ------------------------------------------------------------------
  install:
    executor: node
    steps:
      - checkout
      - restore_cache:
          keys:
            - npm-v1-{{ .Branch }}-{{ checksum "package-lock.json" }}
            - npm-v1-{{ .Branch }}-
            - npm-v1-
      - run:
          name: Install dependencies
          command: npm ci
      - save_cache:
          key: npm-v1-{{ .Branch }}-{{ checksum "package-lock.json" }}
          paths:
            - ~/.npm
      - persist_to_workspace:
          root: .
          paths:
            - node_modules

  # ------------------------------------------------------------------
  # lint, typecheck, test run in parallel after install completes.
  # Attaching the workspace provides node_modules instantly (~2s)
  # instead of running another npm ci (~30–60s).
  # ------------------------------------------------------------------
  lint:
    executor: node
    steps:
      - checkout
      - attach_workspace:
          at: .
      - run:
          name: Lint
          command: npm run lint

  typecheck:
    executor: node
    steps:
      - checkout
      - attach_workspace:
          at: .
      - run:
          name: Type check
          command: npm run typecheck

  test:
    executor: node
    steps:
      - checkout
      - attach_workspace:
          at: .
      - run:
          name: Run tests
          no_output_timeout: 10m
          # --ci: disables watch mode, fails on new snapshots, deterministic output
          # --forceExit: prevents Jest from hanging on open handles (Firebase, async)
          # --passWithNoTests: succeeds when no test files exist yet
          command: npm test -- --ci --forceExit --passWithNoTests

  # ------------------------------------------------------------------
  # android-release: builds a signed release AAB (Android App Bundle)
  # ready for Google Play upload. Runs only on the main branch after
  # all quality gates pass.
  #
  # Required CircleCI environment variables (set in Project Settings):
  #   ANDROID_KEYSTORE_BASE64  — base64-encoded release.keystore
  #   ANDROID_KEY_ALIAS        — key alias (vanir-release)
  #   ANDROID_STORE_PASSWORD   — keystore + key password (PKCS12 unified)
  # ------------------------------------------------------------------
  android-release:
    executor: android
    steps:
      - checkout

      - run:
          name: Install Node 22.11
          command: |
            curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.39.7/install.sh | bash
            echo 'export NVM_DIR="$HOME/.nvm"' >> $BASH_ENV
            echo '[ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"' >> $BASH_ENV
            source $BASH_ENV
            nvm install 22.11.0
            nvm alias default 22.11.0

      - run:
          name: Accept Android SDK licenses and install SDK components
          command: |
            yes | sdkmanager --licenses 2>/dev/null || true
            sdkmanager \
              "platforms;android-36" \
              "build-tools;36.0.0" \
              "ndk;27.1.12297006"

      - restore_cache:
          keys:
            - gradle-v1-{{ checksum "android/build.gradle" }}-{{ checksum "android/app/build.gradle" }}
            - gradle-v1-

      - restore_cache:
          keys:
            - npm-v1-{{ .Branch }}-{{ checksum "package-lock.json" }}
            - npm-v1-{{ .Branch }}-
            - npm-v1-

      - run:
          name: Install JS dependencies
          command: npm ci

      - save_cache:
          key: npm-v1-{{ .Branch }}-{{ checksum "package-lock.json" }}
          paths:
            - ~/.npm

      - run:
          name: Decode release keystore
          command: |
            echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/release.keystore

      - run:
          name: Build release AAB
          no_output_timeout: 20m
          command: |
            cd android && ./gradlew bundleRelease \
              -PRELEASE_STORE_FILE=release.keystore \
              -PRELEASE_KEY_ALIAS="$ANDROID_KEY_ALIAS" \
              -PRELEASE_STORE_PASSWORD="$ANDROID_STORE_PASSWORD" \
              -PRELEASE_KEY_PASSWORD="$ANDROID_STORE_PASSWORD"

      - save_cache:
          key: gradle-v1-{{ checksum "android/build.gradle" }}-{{ checksum "android/app/build.gradle" }}
          paths:
            - ~/.gradle/caches
            - ~/.gradle/wrapper

      - store_artifacts:
          path: android/app/build/outputs/bundle/release/app-release.aab
          destination: app-release.aab

workflows:
  build-and-test:
    jobs:
      - install
      - lint:
          requires:
            - install
      - typecheck:
          requires:
            - install
      - test:
          requires:
            - install
      - android-release:
          requires:
            - lint
            - typecheck
            - test
          filters:
            branches:
              only: main
