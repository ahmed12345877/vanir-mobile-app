version: 2.1

orbs:
  # Provides `node/install` for adding Node.js to the Android executor.
  node: circleci/node@6.3.0

# ---------------------------------------------------------------------------
# Executors
# ---------------------------------------------------------------------------
executors:
  node:
    docker:
      - image: cimg/node:22.11
    resource_class: medium

  android:
    docker:
      # cimg/android ships with Java 17, Android SDK (API 34), and Gradle.
      # Node.js is installed separately via the node orb.
      - image: cimg/android:2024.11.1
    resource_class: large
    environment:
      JVM_OPTS: -Xmx2g
      GRADLE_OPTS: >-
        -Dorg.gradle.daemon=false
        -Dorg.gradle.workers.max=1
        -Dkotlin.incremental=false
      # Limit Ninja/CMake parallel Clang jobs so they don't OOM alongside the JVM.
      CMAKE_BUILD_PARALLEL_LEVEL: 1

# ---------------------------------------------------------------------------
# Jobs
# ---------------------------------------------------------------------------
jobs:
  # -------------------------------------------------------------------------
  # install — single source of truth for JS dependency installation.
  # Caches ~/.npm keyed on package-lock.json; persists node_modules to the
  # workspace so downstream JS jobs reuse the same install without re-running
  # npm ci.
  # -------------------------------------------------------------------------
  install:
    executor: node
    steps:
      - checkout
      - restore_cache:
          keys:
            - npm-v1-{{ .Branch }}-{{ checksum "package-lock.json" }}
            - npm-v1-{{ .Branch }}-
            - npm-v1-
      - run:
          name: Install dependencies
          command: npm ci
      - save_cache:
          key: npm-v1-{{ .Branch }}-{{ checksum "package-lock.json" }}
          paths:
            - ~/.npm
      - persist_to_workspace:
          root: .
          paths:
            - node_modules

  # -------------------------------------------------------------------------
  # lint, typecheck, test run in parallel after install completes.
  # -------------------------------------------------------------------------
  lint:
    executor: node
    steps:
      - checkout
      - attach_workspace:
          at: .
      - run:
          name: Lint
          command: npm run lint

  typecheck:
    executor: node
    steps:
      - checkout
      - attach_workspace:
          at: .
      - run:
          name: Type check
          command: npm run typecheck

  test:
    executor: node
    steps:
      - checkout
      - attach_workspace:
          at: .
      - run:
          name: Run tests
          # --ci: disables watch mode, fails on new snapshots, deterministic output
          # --forceExit: prevents Jest from hanging on open handles (Firebase, async)
          command: npm test -- --ci --forceExit

  # -------------------------------------------------------------------------
  # android-apk — compiles the React Native JS bundle and Gradle release APK.
  #
  # Required CircleCI environment variables (set in Project Settings → Env Vars):
  #   GOOGLE_SERVICES_JSON      — base64-encoded or raw contents of google-services.json
  #   RELEASE_KEYSTORE_BASE64   — base64-encoded .jks / .keystore release file
  #   RELEASE_STORE_PASSWORD    — keystore password
  #   RELEASE_KEY_ALIAS         — key alias inside the keystore
  #   RELEASE_KEY_PASSWORD      — key password
  #
  # The built APK is uploaded as a CircleCI artifact and can be downloaded
  # from the Artifacts tab of the build in the CircleCI web UI.
  # -------------------------------------------------------------------------
  android-apk:
    executor: android
    steps:
      - checkout

      # Install Node.js (cimg/android does not bundle it).
      - node/install:
          node-version: '22.11.0'

      # Restore JS package cache before npm ci to skip re-downloading.
      - restore_cache:
          keys:
            - npm-v1-{{ .Branch }}-{{ checksum "package-lock.json" }}
            - npm-v1-{{ .Branch }}-
            - npm-v1-

      - run:
          name: Install JS dependencies
          command: npm ci

      - save_cache:
          key: npm-v1-{{ .Branch }}-{{ checksum "package-lock.json" }}
          paths:
            - ~/.npm

      # Gradle build caching — keyed on both Gradle files so any dependency
      # or plugin change invalidates the cache.
      - restore_cache:
          keys:
            - gradle-v2-{{ checksum "android/build.gradle" }}-{{ checksum "android/app/build.gradle" }}
            - gradle-v2-

      - run:
          name: Write google-services.json
          # GOOGLE_SERVICES_JSON can be the raw JSON string or base64-encoded.
          # The 'base64 -d' fallback handles both variants safely.
          command: |
            echo "$GOOGLE_SERVICES_JSON" > android/app/google-services.json

      - run:
          name: Decode release keystore
          # Decode the base64-encoded release keystore stored in CI secrets and
          # write it to the path referenced by RELEASE_STORE_FILE below.
          command: |
            echo "$RELEASE_KEYSTORE_BASE64" | base64 -d > android/app/vanir-release.keystore

      - run:
          name: Make Gradle wrapper executable
          command: chmod +x android/gradlew

      - run:
          name: Install Ninja build system
          command: sudo apt-get update -qq && sudo apt-get install -y ninja-build

      # Pre-install the NDK and Build Tools versions required by the build so
      # they are not downloaded during the Gradle configuration phase, saving
      # several minutes of build time.
      - restore_cache:
          keys:
            - android-sdk-tools-v1

      - run:
          name: Pre-install NDK and Build Tools
          command: |
            if [ ! -d "$ANDROID_HOME/ndk/27.0.12077973" ]; then
              sdkmanager "ndk;27.0.12077973"
            fi
            if [ ! -d "$ANDROID_HOME/build-tools/35.0.0" ]; then
              sdkmanager "build-tools;35.0.0"
            fi

      - save_cache:
          key: android-sdk-tools-v1
          paths:
            - /home/circleci/android-sdk/ndk/27.0.12077973
            - /home/circleci/android-sdk/build-tools/35.0.0

      # Restore cached CMake build outputs so arm64 C++ compilation is skipped
      # on repeat builds (the .cxx directory holds per-ABI Ninja build trees).
      - restore_cache:
          keys:
            - cmake-arm64-v2-{{ checksum "android/app/build.gradle" }}
            - cmake-arm64-v2-

      - run:
          name: Build release APK
          working_directory: android
          no_output_timeout: 60m
          # Pass release signing properties directly so they are never written
          # to gradle.properties on disk and cannot be leaked in cache.
          command: |
            ./gradlew assembleRelease \
              -PRELEASE_STORE_FILE=vanir-release.keystore \
              -PRELEASE_STORE_PASSWORD="$RELEASE_STORE_PASSWORD" \
              -PRELEASE_KEY_ALIAS="$RELEASE_KEY_ALIAS" \
              -PRELEASE_KEY_PASSWORD="$RELEASE_KEY_PASSWORD" \
              --no-daemon \
              --stacktrace

      - save_cache:
          key: gradle-v2-{{ checksum "android/build.gradle" }}-{{ checksum "android/app/build.gradle" }}
          paths:
            - ~/.gradle/caches
            - ~/.gradle/wrapper

      - save_cache:
          key: cmake-arm64-v2-{{ checksum "android/app/build.gradle" }}
          paths:
            - android/app/.cxx

      # Upload APK so it appears on the Artifacts tab and can be downloaded
      # without a local Android build environment.
      - store_artifacts:
          path: android/app/build/outputs/apk/release/app-release.apk
          destination: vanir-group-release.apk

      # Also persist the APK to the workspace so a downstream deploy job could
      # push it to Firebase App Distribution without rebuilding.
      - persist_to_workspace:
          root: .
          paths:
            - android/app/build/outputs/apk/release/app-release.apk

# ---------------------------------------------------------------------------
# Workflows
# ---------------------------------------------------------------------------
workflows:
  # --------------------------------------------------------------------------
  # build-and-test — runs on every push and PR for JS quality gates.
  # --------------------------------------------------------------------------
  build-and-test:
    jobs:
      - install
      - lint:
          requires:
            - install
      - typecheck:
          requires:
            - install
      - test:
          requires:
            - install

  # --------------------------------------------------------------------------
  # android-release — builds the signed release APK.
  # Triggered automatically on pushes to main or release/* branches, and can
  # be triggered manually for any branch via the CircleCI UI (rerun workflow).
  # --------------------------------------------------------------------------
  android-release:
    jobs:
      - android-apk:
          filters:
            branches:
              only:
                - main
                - /release\/.*/
